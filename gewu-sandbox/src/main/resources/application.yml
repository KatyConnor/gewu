server:
  port: 8082

spring:
  profiles:
    active: dev

  datasource:
    url: jdbc:mysql://localhost:3306/gewu_dev?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: gewu
    password: gewu123456
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      minimum-idle: 3
      maximum-pool-size: 10
      idle-timeout: 30000
      max-lifetime: 1800000
      connection-timeout: 30000

  data:
    redis:
      host: localhost
      port: 6379
      password:
      database: 0
      timeout: 5000ms

  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    default-property-inclusion: non_null

mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  type-aliases-package: com.gewu.domain
  global-config:
    db-config:
      id-type: ASSIGN_UUID
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

gewu:
  sandbox:
    docker:
      host: unix:///var/run/docker.sock
    defaults:
      cpu: 1
      memory-mb: 512
      disk-mb: 1024
      timeout-seconds: 300
      image: gewu/sandbox-base:latest
      network-enabled: false

logging:
  level:
    root: INFO
    com.gewu: DEBUG
  pattern:
    dateformat: yyyy-MM-dd HH:mm:ss.SSS
