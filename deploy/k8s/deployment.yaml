apiVersion: apps/v1
kind: Deployment
metadata:
  name: gewu-platform
  namespace: gewu
  labels:
    app: gewu-platform
spec:
  replicas: 2
  selector:
    matchLabels:
      app: gewu-platform
  template:
    metadata:
      labels:
        app: gewu-platform
    spec:
      containers:
        - name: gewu-platform
          image: gewu/platform:1.0.0-SNAPSHOT
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              protocol: TCP
          envFrom:
            - configMapRef:
                name: gewu-platform-config
            - secretRef:
                name: gewu-platform-secret
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3