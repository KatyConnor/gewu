apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: gewu-platform
  namespace: gewu
  labels:
    app: gewu-platform
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: gewu-platform
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70