server:
  port: 8080

spring:
  application:
    name: gewu-gateway
  cloud:
    gateway:
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Origin
      routes:
        - id: gewu-interface
          uri: lb://gewu-interface
          predicates:
            - Path=/api/**
          filters:
            - name: CircuitBreaker
              args:
                name: interfaceCB
                fallbackUri: forward:/fallback
            - JwtAuth
            - RateLimit
        - id: gewu-interface-direct
          uri: http://localhost:8081
          predicates:
            - Path=/api/**
          filters:
            - JwtAuth
            - RateLimit
      discovery:
        locator:
          enabled: false
  data:
    redis:
      host: localhost
      port: 6379

gewu:
  gateway:
    jwt:
      secret: gewu-platform-jwt-secret-key-must-be-at-least-256-bits-long-for-hs256
      skip-paths:
        - /api/v1/auth/login
        - /api/v1/auth/register
        - /api/v1/auth/refresh
    rate-limit:
      permits: 100
      timeout-seconds: 60

resilience4j:
  circuitbreaker:
    instances:
      interfaceCB:
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        sliding-window-size: 10
        sliding-window-type: COUNT_BASED
        permitted-number-of-calls-in-half-open-state: 5

